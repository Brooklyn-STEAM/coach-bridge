  <h1 class="text-4xl text-center font-bold mt-10">
    Join as a Coach
  </h1>

  <p class="text-center mt-2 text-lg">
    Share your skills. Get discovered. Start coaching athletes.
  </p>

  
  <form class="text-center text-xl mt-6" action="https://form-to-email.steamc.workers.dev/" method="post">
    
    <input name="send-to" value="emaricheau@brooklynsteamcenter.org" hidden>

    
    <label class="input input-primary">
      <input type="text" placeholder="Full Name" required />
    </label>

    <br><br>

    <label class="input input-primary">
      <input type="email" placeholder="Email Address" required />
    </label>

    <br><br>

    <select class="select select-primary">
      <option disabled selected>What do you coach?</option>
      <option>Basketball</option>
      <option>Football</option>
      <option>Soccer</option>
      <option>Boxing</option>
      <option>Other</option>
    </select>

    <br><br>


    <input type="text" placeholder="Years of Experience" class="input input-primary" />

    <br><br>

    
    <textarea class="textarea textarea-primary" placeholder="Short Bio / What makes you a great coach?"></textarea>
    <br><br><button type="submit" class="btn btn-secondary">
        Apply as Coach
      </button>
