<!DOCTYPE html>
<html data-theme="lemonade" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/styles/main.css">
  <title>Join as a Coach</title>
</head>
<body>
  <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1">
      <a href="index.html" class="btn btn-ghost text-xl">Coach Connect</a>
    </div>
    <div class="flex-none">
      <ul class="menu menu-horizontal px-1">
        <li><a href="index.html">Home</a></li>
        <li><a href="find.html">Find A Coach</a></li>
        <li><a href="join.html">Join as Coach</a></li>
      </ul>
    </div>
  </div>

  
  <h1 class="text-4xl text-center font-bold mt-10">
    Join as a Coach
  </h1>

  <p class="text-center mt-2 text-lg">
    Share your skills. Get discovered. Start coaching athletes.
  </p>

  
  <form class="text-center text-xl mt-6" action="https://form-to-email.steamc.workers.dev/" method="post">
    
    <input name="send-to" value="emaricheau@brooklynsteamcenter.org" hidden>

    
    <label class="input input-primary">
      <input type="text" placeholder="Full Name" required />
    </label>

    <br><br>

    <label class="input input-primary">
      <input type="email" placeholder="Email Address" required />
    </label>

    <br><br>

    <select class="select select-primary">
      <option disabled selected>What do you coach?</option>
      <option>Basketball</option>
      <option>Football</option>
      <option>Soccer</option>
      <option>Boxing</option>
      <option>Other</option>
    </select>

    <br><br>


    <input type="text" placeholder="Years of Experience" class="input input-primary" />

    <br><br>

    
    <textarea class="textarea textarea-primary" placeholder="Short Bio / What makes you a great coach?"></textarea>

    <br><br>

    
    <button type="submit" class="btn btn-secondary">
      Apply as Coach
    </button>

    <p class="text-4xl text-center"> Find A Coach</p>
    <form class="text-center text-xl" action="https://form-to-email.steamc.workers.dev/" method="post">
        <input name="send-to" value="emaricheau@brooklynsteamcenter.org" hidden>

        <label class="input input-primary validator">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </g>
            </svg>
            <input type="text" required placeholder="Username" pattern="[A-Za-z][A-Za-z0-9\-]*" minlength="3"
                maxlength="30" title="Only letters, numbers or dash" />
        </label>

        <br>

        <label class="input input-primary validator">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                </g>
            </svg>
            <input type="email" placeholder="mail@site.com" required />
        </label>
        <div class="validator-hint hidden">Enter valid email address</div>

        <br>
        <select class="select select-primary">
            <option disabled selected>Pick what you want to work on</option>
            <option>Finishing</option>
            <option>Shooting</option>
            <option>Ball handling/playmaking</option>
            <option>Defense</option>
        </select>
        <br>
        <input type="text" placeholder="Height" class="input input-primary" />
        <br>
        <button type="submit">Contact Me!</button>
    
</body>
