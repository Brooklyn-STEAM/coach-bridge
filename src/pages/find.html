<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/styles/main.css">
    <title>My Project</title>
</head>
<body>
    

<form
        action="https://form-to-email.steamc.workers.dev/"
        method="post"
        > 
        <input name="send-to" value="emaricheau@brooklynsteamcenter.org" hidden> 

        <label class="input validator">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </g>
            </svg>
            <input
              type="text"
              required
              placeholder="Username"
              pattern="[A-Za-z][A-Za-z0-9\-]*"
              minlength="3"
              maxlength="30"
              title="Only letters, numbers or dash"
            />
          </label>
          <p class="validator-hint">
            Must be 3 to 30 characters
            <br />containing only letters, numbers or dash
          </p>
<br>

<label class="input validator">
    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <g
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="2.5"
        fill="none"
        stroke="currentColor"
      >
        <rect width="20" height="16" x="2" y="4" rx="2"></rect>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
      </g>
    </svg>
    <input type="email" placeholder="mail@site.com" required />
  </label>
  <div class="validator-hint hidden">Enter valid email address</div>
  
<br>
<select class="select select-primary">
    <option disabled selected>Pick what you want to work on</option>
    <option>Finishing</option>
    <option>Shooting</option>
    <option>Ball handling/playmaking</option>
    <option>Defense</option>
  </select>

<input type="text" placeholder=" Reason for contact">
<button type="submit">Contact Me!</button>  
</form>
</body>
